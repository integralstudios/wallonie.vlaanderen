      .flag {
        position: fixed;
        inset: 0;

      .control-btn {

        left: 50%;
        width: 44px;
        height: 44px;

      .mute-btn.is-wave-collapsing .wave-samples {

        overflow: hidden;
        pointer-events: none;

      .lyrics-background-image {

        transform: scale(1.08);

      .lyrics-language-underline {

        background: #ffffff;

          width 0.34s cubic-bezier(0.22, 0.61, 0.36, 1);
      }
      .lyrics-viewport {

        --lyrics-viewport-fade-top: 32px;
        --lyrics-viewport-fade-top-mid: 20px;
        --lyrics-viewport-fade-top-soft: 8px;
        position: absolute;
        top: 0;
        left: max(24px, calc((100% - 1000px) / 2));
        right: max(24px, calc((100% - 1000px) / 2));
        bottom: 0;
        z-index: 1;
        width: auto;
        height: auto;
        overflow-y: hidden;
        overscroll-behavior: contain;
        scrollbar-width: thin;
      }
      .lyrics-viewport.has-overflow {
        overflow-y: auto;
        -webkit-mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.12) 0,
          rgba(0, 0, 0, 0.38) var(--lyrics-viewport-fade-top-soft),

          rgba(0, 0, 0, 0.38) var(--lyrics-viewport-fade-soft),

        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.12) 0,
          rgba(0, 0, 0, 0.38) var(--lyrics-viewport-fade-top-soft),
          rgba(0, 0, 0, 0.84) var(--lyrics-viewport-fade-top-mid),
          #000 var(--lyrics-viewport-fade-top),
          #000 calc(100% - var(--lyrics-viewport-fade)),
          rgba(0, 0, 0, 0.84) var(--lyrics-viewport-fade-mid),

      }
      .lyrics-overlay.is-open.is-lyrics-entering .lyrics-viewport.has-overflow {

      .lyrics-track {

      @keyframes lyricsTrackRise {
        from {

          transform: translate3d(0, 0, 0);

      }

      @media (max-width: 520px) {

          right: 18px;
        }
        .lyrics-line {

        }
        .lyrics-title {
          display: none;
        }
        .lyrics-language-switcher {

      }
