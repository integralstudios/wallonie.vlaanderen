    <title>BELGIE - BELGIQUE - BELGIEN</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/3.0.2/normalize.min.css">
    <link rel="stylesheet" href="https://use.typekit.net/qsr7tur.css">
    <style media="screen">
      html, body, table {
        height: 100%;
        width: 100%;
      }
      td {
        width: 33%;
      }
      .black {
        background-color: #000000;
      }
      .yellow {
        background-color: #FDDA24;
      }
      .red {
        background-color: #EF3340;
      }
      body {
        margin: 0;
        overflow: hidden;
      }
      .control-btn {
        position: fixed;
        bottom: 32px;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
        z-index: 20;
        -webkit-tap-highlight-color: transparent;
      }
      .mute-btn {
        right: 32px;
      }
      .lyrics-btn {
        right: 108px;
      }
      .control-btn .ring {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 48px;
        height: 48px;
        margin: -24px 0 0 -24px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      .control-btn:hover .ring,
      .control-btn:focus-visible .ring,
      .lyrics-btn.is-active .ring {
        transform: scale(1.1);
        background: rgba(255, 255, 255, 0.12);
      }
      .control-btn:focus {
        outline: none;
      }
      .control-btn .icon {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        margin: -10px 0 0 -10px;
        fill: #ffffff;
        transform-origin: center;
        transition: opacity 0.24s cubic-bezier(0.33, 1, 0.68, 1),
          transform 0.24s cubic-bezier(0.33, 1, 0.68, 1),
          filter 0.24s cubic-bezier(0.33, 1, 0.68, 1);
      }
      .lyrics-overlay {
        position: fixed;
        inset: 0;
        z-index: 15;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: 72px 24px 116px;
        color: #ffffff;
        background: #120f0d;
        overflow: hidden;
        isolation: isolate;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.32s cubic-bezier(0.33, 1, 0.68, 1);
      }
      .lyrics-overlay.is-open {
        opacity: 1;
        pointer-events: auto;
      }
      .lyrics-background {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background: #120f0d;
      }
      .lyrics-background-image {
        position: absolute;
        inset: -42px;
        background-image: url('lyrics-bg.jpg');
        background-size: cover;
        background-position: center;
        filter: blur(28px) saturate(1.12);
        opacity: 0.96;
        transform: scale(1.08);
      }
      .lyrics-background-wash {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.34) 54%, rgba(0, 0, 0, 0.66)),
          radial-gradient(circle at 50% 32%, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.08) 44%, rgba(0, 0, 0, 0.46) 100%);
      }
      .lyrics-language-switcher {
        position: fixed;
        top: 28px;
        left: 50%;
        z-index: 21;
        display: flex;
        gap: 8px;
        transform: translateX(-50%);
      }
      .lyrics-language {
        min-width: 48px;
        min-height: 36px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.68);
        background: rgba(255, 255, 255, 0.08);
        font: 700 13px/1 Arial, Helvetica, sans-serif;
        letter-spacing: 0;
        cursor: pointer;
      }
      .lyrics-language.is-selected {
        color: #111111;
        background: rgba(255, 255, 255, 0.94);
      }
      .lyrics-viewport {
        position: relative;
        z-index: 1;
        width: min(1000px, 100%);
        max-height: min(84vh, 760px);
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-width: thin;
      }
      .lyrics-track {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .lyrics-overlay.is-open .lyrics-track {
        animation: lyricsTrackRise 0.82s cubic-bezier(0.22, 0.61, 0.36, 1) both;
      }
      .lyrics-line {
        margin: 0;
        color: rgba(255, 255, 255, 0.82);
        font: 300 20px/1.18 "mendl-serif-dawn", sans-serif;
        font-style: normal;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: 0;
        text-align: center;
      }
      .lyrics-line.is-spacer {
        height: 32px;
      }
      .lyrics-word {
        display: inline-block;
      }
      .lyrics-overlay.is-open .lyrics-word {
        animation: lyricWordIn 0.68s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        animation-delay: calc(var(--word-index) * 15ms);
      }
      @keyframes lyricsTrackRise {
        from {
          transform: translate3d(0, 28px, 0);
        }
        to {
          transform: translate3d(0, 0, 0);
        }
      }
      @keyframes lyricWordIn {
        from {
          opacity: 0;
          transform: translate3d(0, 32px, 0);
        }
        64% {
          opacity: 1;
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }
      .mute-btn .icon-on {
        opacity: 1;
        transform: scale(1) rotate(0deg);
        filter: blur(0);
      }
      .mute-btn .icon-off {
        opacity: 0;
        transform: scale(0.9) rotate(-10deg);
        filter: blur(3px);
      }
      .mute-btn.is-muted .icon-on {
        opacity: 0;
        transform: scale(0.9) rotate(10deg);
        filter: blur(3px);
      }
      .mute-btn.is-muted .icon-off {
        opacity: 1;
        transform: scale(1) rotate(0deg);
        filter: blur(0);
      }
      @media (max-width: 520px) {
        .control-btn {
          bottom: 20px;
        }
        .mute-btn {
          right: 20px;
        }
        .lyrics-btn {
          right: 88px;
        }
        .lyrics-overlay {
          padding: 76px 18px 104px;
        }
        .lyrics-track {
          gap: 8px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .control-btn .ring,
        .lyrics-overlay,
        .lyrics-background-image,
        .lyrics-line {
          transition: none;
        }
        .lyrics-overlay.is-open .lyrics-track {
          animation: none;
          transform: none;
        }
        .lyrics-overlay.is-open .lyrics-word {
          animation: none;
          opacity: 1;
          transform: none;
        }
        .control-btn:hover .ring,
        .control-btn:focus-visible .ring,
        .lyrics-btn.is-active .ring {
          transform: none;
        }
        .mute-btn .icon {
          transition: opacity 0.15s linear;
        }
        .mute-btn .icon-on,
        .mute-btn .icon-off,
        .mute-btn.is-muted .icon-on,
        .mute-btn.is-muted .icon-off {
          transform: none;
          filter: none;
        }
      }
    </style>
  </head>
  <body>

    <script>
      console.log('🇧🇪 BELGIE - BELGIQUE - BELGIEN 🇧🇪')
      ;(function () {
        var audio = document.getElementById('anthem');
        var btn = document.getElementById('muteBtn');
        var lyricsBtn = document.getElementById('lyricsBtn');
        var lyricsOverlay = document.getElementById('lyricsOverlay');
        var lyricsTrack = document.getElementById('lyricsTrack');
        var languageButtons = Array.prototype.slice.call(document.querySelectorAll('.lyrics-language'));
        var muted = false;
        var playbackBlocked = false;
        var isPlaying = true;
        var lyricsOpen = false;
        var selectedLanguage = 'nl';
        var LYRICS = {
          nl: [
            "O dierbaar België, o heilig land der vaad'ren",
            "Onze ziel en ons hart zijn u gewijd.",
            "",
            "Aanvaard ons kracht en het bloed van onze adren,",
            "Wees ons doel in arbeid en in strijd.",
            "",
            "Bloei, o land, in eendracht niet te breken;",
            "Wees immer u zelf en ongeknecht,",
            "",
            "Het woord getrouw, dat ge onbevreesd moogt spreken:",
            "Voor Vorst, voor Vrijheid en voor Recht.",
            "",
            "Het woord getrouw, dat ge onbevreesd moogt spreken:",
            "Voor Vorst, voor Vrijheid en voor Recht!",
            "",
            "Voor Vorst, voor Vrijheid en voor Recht!",
            "Voor Vorst, voor Vrijheid en voor Recht!"
          ],
          fr: [
            "O Belgique, ô mère chérie,",
            "À toi nos cœurs, à toi nos bras,",
            "À toi notre sang, ô Patrie !",
            "Nous le jurons tous, tu vivras !",
            "Tu vivras toujours grande et belle",
            "Et ton invincible unité",
            "Aura pour devise immortelle :",
            "Le Roi, la Loi, la Liberté ! (ter)"
          ],
          de: [
            "O liebes Land, o Belgiens Erde,",
            "Dir unser Herz, Dir unsere Hand,",
            "Dir unser Blut, dem Heimatherde,",
            "wir schwören's Dir, o Vaterland!",
            "So blühe froh in voller Schöne,",
            "zu der die Freiheit Dich erzog,",
            "und fortan singen Deine Söhne:",
            "Gesetz und König und die Freiheit hoch!"
          ]
        };

        function render() {
          var shouldShowSoundOff = muted || playbackBlocked || !isPlaying;
          btn.classList.toggle('is-muted', shouldShowSoundOff);
          btn.setAttribute('aria-pressed', String(muted));
          btn.setAttribute('aria-label', muted ? 'Unmute' : shouldShowSoundOff ? 'Play anthem' : 'Mute');
        }

        function play() {
          if (muted) return;
          var p;
          try {
            p = audio.play();
          } catch (err) {
            playbackBlocked = true;
            isPlaying = false;
            render();
            return;
          }
          if (p && typeof p.then === 'function') {
            p.then(function () {
              playbackBlocked = false;
              isPlaying = true;
              render();
            }).catch(function () {
              playbackBlocked = true;
              isPlaying = false;
              render();
            });
          } else {
            playbackBlocked = false;
            isPlaying = true;
            render();
          }
        }

        function renderLyrics() {
          var lines = LYRICS[selectedLanguage];
          var wordIndex = 0;
          while (lyricsTrack.firstChild) lyricsTrack.removeChild(lyricsTrack.firstChild);
          lines.forEach(function (line, index) {
            var lineNode = document.createElement('p');
            lineNode.className = 'lyrics-line';
            lineNode.setAttribute('data-index', String(index));
            if (!line.trim()) {
              lineNode.className += ' is-spacer';
              lyricsTrack.appendChild(lineNode);
              return;
            }
            var tokens = line.split(/(\s+)/);
            tokens.forEach(function (part) {
              if (!part.trim()) {
                lineNode.appendChild(document.createTextNode(part));
                return;
              }
              var wordNode = document.createElement('span');
              wordNode.className = 'lyrics-word';
              wordNode.style.setProperty('--word-index', String(wordIndex));
              wordNode.textContent = part;
              wordIndex += 1;
              lineNode.appendChild(wordNode);
            });
            lyricsTrack.appendChild(lineNode);
          });
          lyricsTrack.parentNode.scrollTop = 0;
        }

        function renderLyricsControls() {
          lyricsBtn.classList.toggle('is-active', lyricsOpen);
          lyricsBtn.setAttribute('aria-pressed', String(lyricsOpen));
          lyricsBtn.setAttribute('aria-label', lyricsOpen ? 'Hide lyrics' : 'Show lyrics');
          lyricsOverlay.classList.toggle('is-open', lyricsOpen);
          lyricsOverlay.setAttribute('aria-hidden', String(!lyricsOpen));
          if (!lyricsOpen && lyricsOverlay.contains(document.activeElement)) lyricsBtn.focus();
          if (lyricsOpen) lyricsOverlay.removeAttribute('inert');
          else lyricsOverlay.setAttribute('inert', '');
          languageButtons.forEach(function (languageButton) {
            var isSelected = languageButton.getAttribute('data-language') === selectedLanguage;
            languageButton.classList.toggle('is-selected', isSelected);
            languageButton.setAttribute('aria-pressed', String(isSelected));
          });
        }

        function setLyricsOpen(open) {
          lyricsOpen = open;
          if (lyricsOpen && !lyricsTrack.children.length) renderLyrics();
          renderLyricsControls();
          if (lyricsOpen) {
            play();
          }
        }

        function setLanguage(language) {
          if (!LYRICS[language] || selectedLanguage === language) return;
          selectedLanguage = language;
          renderLyrics();
          renderLyricsControls();
        }

        // Start the anthem. Browsers block audible autoplay until the visitor
        // interacts with the page, so also kick it off on the first interaction.
        play();
        var events = ['pointerdown', 'keydown', 'touchstart', 'scroll'];
        function onFirstInteraction(evt) {
          // If this first interaction is a control, let its click handler decide
          // whether to play. Otherwise pointerdown/keydown can start playback a
          // beat before the control click handles the interaction.
          var isControl = evt.target && evt.target.closest && evt.target.closest('.control-btn');
          if (isControl) return;
          play();
          events.forEach(function (name) {
            document.removeEventListener(name, onFirstInteraction);
          });
        }
        events.forEach(function (name) {
          document.addEventListener(name, onFirstInteraction);
        });

        lyricsBtn.addEventListener('click', function () {
          setLyricsOpen(!lyricsOpen);
        });

        languageButtons.forEach(function (languageButton) {
          languageButton.addEventListener('click', function () {
            setLanguage(languageButton.getAttribute('data-language'));
          });
        });

        document.addEventListener('keydown', function (evt) {
          if (evt.key === 'Escape' && lyricsOpen) setLyricsOpen(false);
        });

        // Mute / unmute, resuming playback when unmuted.
        btn.addEventListener('click', function () {
          if (playbackBlocked || !isPlaying || audio.paused) {
            muted = false;
            audio.muted = false;
            play();
            render();
            return;
          }
          muted = !muted;
          audio.muted = muted;
          play();
          render();
        });

        renderLyricsControls();
        render();
      })();
    </script>
