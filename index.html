<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>BELGIE - BELGIQUE - BELGIEN</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/3.0.2/normalize.min.css">
    <style media="screen">
      html, body { height: 100%; width: 100%; margin: 0; overflow: hidden; background: #000; }
      /* Flat tricolour fallback — shown if WebGL2 is unavailable or fails. */
      #flag-fallback {
        position: fixed; inset: 0;
        background: linear-gradient(to right,
          #000000 0, #000000 33.333%,
          #FDDA24 33.333%, #FDDA24 66.666%,
          #EF3340 66.666%, #EF3340 100%);
      }
      /* Animated waving-fabric flag (drawn on top of the fallback). */
      #flag { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
    </style>
  </head>
  <body>
    <div id="flag-fallback"></div>
    <canvas id="flag"></canvas>

    <iframe id="iframeAudio" src="belgium.mp3" allow="autoplay" style="display:none"></iframe>
    <audio id="playAudio" preload="auto" loop autoplay>
      <source src="belgium.mp3" type="audio/mpeg">
      <source src="belgium.ogg" type="audio/ogg">
    </audio>

    <script src="flag-fabric/flag-fabric.js"></script>
    <script>
      console.log('🇧🇪 BELGIE - BELGIQUE - BELGIEN 🇧🇪')

      // Animated Belgian tricolour. Falls back to the flat CSS flag if WebGL2 fails.
      try {
        var fab = new FlagFabric(document.getElementById('flag'), FlagFabric.PRESETS.belgium);
        fab.start();
      } catch (e) {
        console.warn('Flag shader unavailable, showing flat flag:', e);
        var c = document.getElementById('flag');
        if (c) c.parentNode.removeChild(c);
      }

      // Audio autoplay shim (unchanged behaviour).
      var isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
      if (!isChrome) {
        var iframe = document.getElementById('iframeAudio');
        iframe.parentNode.removeChild(iframe);
      } else {
        var audio = document.getElementById('playAudio');
        audio.parentNode.removeChild(audio);
      }
    </script>

  </body>
</html>
