    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/3.0.2/normalize.min.css">
    <style media="screen">
      html, body, table {
        height: 100%;
        width: 100%;
      }
      td {
        width: 33%;
      }
      .black {
        background-color: #000000;
      }
      .yellow {
        background-color: #FDDA24;
      }
      .red {
        background-color: #EF3340;
      }
      .mute-btn {
        position: fixed;
        right: 32px;
        bottom: 32px;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
        z-index: 10;
        -webkit-tap-highlight-color: transparent;
      }
      .mute-btn .ring {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 48px;
        height: 48px;
        margin: -24px 0 0 -24px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        transition: transform 0.2s ease;
      }
      .mute-btn:hover .ring,
      .mute-btn:focus-visible .ring {
        transform: scale(1.1);
      }
      .mute-btn:focus {
        outline: none;
      }
      .mute-btn .icon {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        margin: -10px 0 0 -10px;
        fill: #ffffff;
        transform-origin: center;
        /* ease-out (easeOutCubic) under 300ms; blur bridges the two icons so
           the swap reads as one smooth morph rather than a crossfade of two
           shapes (per Emil Kowalski's animation tips). */
        transition: opacity 0.24s cubic-bezier(0.33, 1, 0.68, 1),
          transform 0.24s cubic-bezier(0.33, 1, 0.68, 1),
          filter 0.24s cubic-bezier(0.33, 1, 0.68, 1);
      }
      .mute-btn .icon-on {
        opacity: 1;
        transform: scale(1) rotate(0deg);
        filter: blur(0);
      }
      .mute-btn .icon-off {
        opacity: 0;
        transform: scale(0.9) rotate(-10deg);
        filter: blur(3px);
      }
      .mute-btn.is-muted .icon-on {
        opacity: 0;
        transform: scale(0.9) rotate(10deg);
        filter: blur(3px);
      }
      .mute-btn.is-muted .icon-off {
        opacity: 1;
        transform: scale(1) rotate(0deg);
        filter: blur(0);
      }
      @media (prefers-reduced-motion: reduce) {
        .mute-btn .icon {
          transition: opacity 0.15s linear;
        }
        .mute-btn .icon-on,
        .mute-btn .icon-off,
        .mute-btn.is-muted .icon-on,
        .mute-btn.is-muted .icon-off {
          transform: none;
          filter: none;
        }
      }
    </style>
  </head>
  <body>

    <script>
      console.log('🇧🇪 BELGIE - BELGIQUE - BELGIEN 🇧🇪')
      ;(function () {
        var audio = document.getElementById('anthem');
        var btn = document.getElementById('muteBtn');
        var muted = false;

        function render() {
          btn.classList.toggle('is-muted', muted);
          btn.setAttribute('aria-pressed', String(muted));
          btn.setAttribute('aria-label', muted ? 'Unmute' : 'Mute');
        }

        function play() {
          if (muted) return;
          var p = audio.play();
          if (p && typeof p.then === 'function') p.catch(function () {});
        }

        // Start the anthem. Browsers block audible autoplay until the visitor
        // interacts with the page, so also kick it off on the first interaction.
        play();
        var events = ['pointerdown', 'keydown', 'touchstart', 'scroll'];
        function onFirstInteraction(evt) {
          // If this first interaction is the mute button itself, let its click
          // handler decide whether to play. Otherwise pointerdown/keydown would
          // start audible playback a beat before the click mutes it (a blip).
          if (!btn.contains(evt.target)) play();
          events.forEach(function (name) {
            document.removeEventListener(name, onFirstInteraction);
          });
        }
        events.forEach(function (name) {
          document.addEventListener(name, onFirstInteraction);
        });

        // Mute / unmute, resuming playback when unmuted.
        btn.addEventListener('click', function () {
          muted = !muted;
          audio.muted = muted;
          play();
          render();
        });

        render();
      })();
    </script>
